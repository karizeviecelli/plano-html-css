<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prática Guiada — Aula 01 HTML</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;color:#1e293b;background:#f8fafc;min-height:100vh;padding:24px}

.pg-wrap{max-width:800px;margin:0 auto;display:flex;flex-direction:column;gap:12px}

/* cabeçalho */
.pg-header{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px}
.pg-title{font-size:18px;font-weight:600;color:#1e293b}
.pg-meta{font-size:12px;color:#64748b;margin-top:2px}
.pg-time{font-size:12px;font-weight:500;color:#64748b;background:#f1f5f9;border:1px solid #e2e8f0;padding:5px 12px;border-radius:8px}

/* progresso */
.prog-row{display:flex;align-items:center;gap:10px}
.prog-bg{flex:1;height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden}
.prog-fg{height:100%;background:#22c55e;border-radius:4px;transition:width .4s ease;width:0%}
.prog-txt{font-size:12px;font-weight:600;color:#64748b;min-width:64px;text-align:right}

.steps-list{display:flex;flex-direction:column;gap:8px}

/* cards */
.step-card{border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;background:#fff;transition:border-color .2s}
.step-card.done{border-color:#86efac}
.step-card.active{border-color:#93c5fd}

.step-head{display:flex;align-items:flex-start;gap:12px;padding:13px 14px;cursor:pointer;user-select:none;transition:background .15s}
.step-head:hover{background:#f8fafc}
.step-card.open .step-head{background:#f8fafc}

.step-check{width:22px;height:22px;border-radius:6px;border:1.5px solid #cbd5e1;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .18s;cursor:pointer;background:#fff}
.step-check:hover{border-color:#3b82f6;background:#eff6ff}
.step-check.done{background:#22c55e;border-color:#22c55e}
.step-check svg{display:none}
.step-check.done svg{display:block}

.step-info{flex:1;min-width:0}
.step-num{font-size:11px;font-weight:600;color:#94a3b8;margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em}
.step-ttl{font-size:14px;font-weight:600;color:#1e293b;line-height:1.3}
.step-time{font-size:11px;color:#94a3b8;margin-top:3px}

.chevron{color:#94a3b8;font-size:12px;margin-top:5px;transition:transform .22s;flex-shrink:0}
.step-card.open .chevron{transform:rotate(180deg)}

.step-body{max-height:0;overflow:hidden;transition:max-height .4s ease}
.step-card.open .step-body{max-height:4000px}
.step-body-inner{padding:0 14px 16px;border-top:1px solid #f1f5f9}

/* instruções */
.instr-list{display:flex;flex-direction:column;gap:7px;margin:12px 0}
.instr-item{display:flex;gap:10px;font-size:13px;color:#475569;line-height:1.55;align-items:flex-start}
.instr-n{width:20px;height:20px;min-width:20px;border-radius:5px;background:#eff6ff;color:#1d4ed8;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;margin-top:1px}

code{font-family:'Courier New',monospace;font-size:12px;background:#f1f5f9;padding:2px 6px;border-radius:4px;border:1px solid #e2e8f0;color:#1e293b}

/* dica */
.tip{background:#fffbeb;border-left:3px solid #f59e0b;padding:9px 12px;font-size:12px;color:#78350f;line-height:1.55;margin-top:10px}
.tip strong{color:#92400e;font-weight:600}

/* marcar concluído */
.mark-btn{display:inline-flex;align-items:center;gap:6px;background:#f8fafc;border:1px solid #cbd5e1;color:#64748b;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .18s;margin-top:12px}
.mark-btn:hover{background:#f0fdf4;color:#15803d;border-color:#86efac}
.mark-btn.done-btn{background:#f0fdf4;color:#15803d;border-color:#86efac;pointer-events:none}

/* banner de conclusão */
.success-banner{background:#f0fdf4;border:1px solid #86efac;border-radius:12px;padding:20px;text-align:center;display:none}
.success-banner.show{display:block}
.success-banner h3{font-size:16px;font-weight:600;color:#15803d;margin-bottom:6px}
.success-banner p{font-size:13px;color:#475569}

a{color:#2563eb}

/* ══════════════════════════════════════
   GABARITO — botão + sanfona
   ══════════════════════════════════════ */
.gabarito-wrap{margin-top:14px}

.gab-btn{
  display:inline-flex;align-items:center;gap:7px;
  background:#1e293b;color:#e2e8f0;
  border:2px solid transparent;
  border-radius:8px;padding:8px 16px;
  font-size:12px;font-weight:700;
  cursor:pointer;font-family:inherit;letter-spacing:.01em;
  transition:background .18s,border-color .18s,box-shadow .18s;
  user-select:none;
}
.gab-btn:hover{background:#0f172a;box-shadow:0 2px 10px rgba(0,0,0,.28)}
.gab-btn.open{
  background:#0f172a;
  border-color:#38bdf8;
  box-shadow:0 0 0 3px rgba(56,189,248,.12);
}

.gab-icon{font-size:14px;line-height:1}
.gab-arr{
  width:14px;height:14px;
  display:inline-flex;align-items:center;justify-content:center;
  transition:transform .28s ease;opacity:.7;
}
.gab-btn.open .gab-arr{transform:rotate(180deg)}

/* corpo sanfona */
.gab-body{
  max-height:0;overflow:hidden;
  transition:max-height .45s cubic-bezier(.4,0,.2,1),opacity .3s ease;
  opacity:0;margin-top:8px;
}
.gab-body.open{max-height:3000px;opacity:1}

/* alerta */
.gab-alert{
  display:flex;align-items:flex-start;gap:8px;
  background:#fffbeb;border:1px solid #fcd34d;
  border-radius:8px 8px 0 0;border-bottom:none;
  padding:9px 14px;font-size:11px;color:#78350f;line-height:1.55;
}

/* barra do código */
.gab-codebar{
  display:flex;align-items:center;justify-content:space-between;
  background:#21262d;border:1px solid #30363d;
  border-top:none;border-bottom:none;
  padding:8px 14px;
}
.gab-lang{font-family:'Courier New',monospace;font-size:11px;color:#f59e0b;font-weight:700;letter-spacing:1px}
.gab-copy{background:none;border:1px solid #30363d;color:#8b949e;font-size:11px;padding:3px 10px;border-radius:4px;cursor:pointer;font-family:system-ui,sans-serif;transition:all .18s}
.gab-copy:hover{border-color:#38bdf8;color:#38bdf8}

/* bloco de código */
.gab-code{
  background:#0d1117;
  border:1px solid #30363d;border-top:none;
  border-radius:0 0 10px 10px;
  padding:16px 20px;
  font-family:'Courier New',monospace;
  font-size:12.5px;line-height:1.85;
  color:#c9d1d9;overflow-x:auto;white-space:pre;margin:0;
}

/* syntax highlighting — HTML */
.hk{color:#7dd3fc}   /* tag name / DOCTYPE          */
.ha{color:#fde68a}   /* atributo                     */
.hs{color:#fda4af}   /* valor de atributo            */
.ht{color:#e2e8f0}   /* texto dentro da tag          */
.hc{color:#6272a4;font-style:italic} /* comentário */
.hm{color:#86efac}   /* meta / head tags             */
</style>
</head>
<body>

<div class="pg-wrap">

  <div class="pg-header">
    <div>
      <div class="pg-title">Prática guiada — Aula 01</div>
      <div class="pg-meta">Siga os passos. Marque cada um quando terminar.</div>
    </div>
    <span class="pg-time">60 min disponíveis</span>
  </div>

  <div class="prog-row">
    <div class="prog-bg"><div class="prog-fg" id="pfg"></div></div>
    <div class="prog-txt" id="ptxt">0 / 7</div>
  </div>

  <div class="steps-list" id="steps-list"></div>

  <div class="success-banner" id="success">
    <h3>Parabéns! Você completou todos os passos. 🎉</h3>
    <p>Sua página HTML5 está pronta e semanticamente correta. Agora é hora do desafio autônomo!</p>
  </div>

</div>

<script>
/* ─────────────────────────────────────────────────────────────
   STEPS — campo 'gab' contém o HTML comentado do gabarito.
   O campo 'code' do arquivo original foi REMOVIDO — o gabarito
   fica oculto atrás do botão sanfona 📋 Gabarito comentado.
   ───────────────────────────────────────────────────────────── */
const STEPS = [

/* ══ PASSO 1 ════════════════════════════════════════════════ */
{
  title: "Criar a pasta e o arquivo",
  time: "5 min",
  instrs: [
    "Crie uma pasta chamada <code>meu-site</code> na Área de Trabalho",
    "Abra o VS Code e arraste a pasta para dentro dele (File &gt; Open Folder)",
    "No painel lateral, clique no ícone de novo arquivo e crie: <code>index.html</code>",
    "Salve com <code>Ctrl+S</code> — o VS Code vai colorir o código automaticamente"
  ],
  tip: "<strong>Dica:</strong> no VS Code, a extensão Live Server (botão 'Go Live' no rodapé) atualiza o browser automaticamente toda vez que você salva.",
  gab:
`<span class="hc">&lt;!-- Este passo não tem código para digitar ainda.
     Aqui você só cria a estrutura de pastas e o arquivo vazio.
     O VS Code reconhece a extensão .html e ativa o syntax highlighting. --&gt;</span>

<span class="hc">&lt;!-- ESTRUTURA DE PASTA ESPERADA: --&gt;</span>
<span class="hc">&lt;!--
  Área de Trabalho/
  └── meu-site/
      └── index.html   ← arquivo que você criou
--&gt;</span>

<span class="hc">&lt;!-- DICA EXTRA: salve o arquivo ANTES de começar a digitar.
     O VS Code só ativa o IntelliSense HTML após salvar com .html --&gt;</span>`
},

/* ══ PASSO 2 ════════════════════════════════════════════════ */
{
  title: "Estrutura mínima do HTML5",
  time: "8 min",
  instrs: [
    "Digite <code>!</code> e pressione <code>Tab</code> — o VS Code gera a estrutura automaticamente!",
    "Verifique se o <code>lang</code> está como <code>pt-BR</code> (mude se necessário)",
    "Altere o conteúdo do <code>&lt;title&gt;</code> para seu nome",
    "Salve e abra no browser: o título aparece na aba"
  ],
  tip: "<strong>Atalho VS Code:</strong> <code>!</code> + Tab gera o esqueleto completo. Economiza tempo e evita erros de digitação.",
  gab:
`<span class="hc">&lt;!-- DOCTYPE informa ao browser qual versão de HTML usar.
     html5 usa só "html" — sem número de versão --&gt;</span>
<span class="hk">&lt;!DOCTYPE html&gt;</span>

<span class="hc">&lt;!-- lang="pt-BR" ajuda leitores de tela e motores de busca
     a entender o idioma do conteúdo --&gt;</span>
<span class="hk">&lt;html</span> <span class="ha">lang</span>=<span class="hs">"pt-BR"</span><span class="hk">&gt;</span>

<span class="hk">&lt;head&gt;</span>
  <span class="hc">&lt;!-- charset UTF-8 permite acentos e caracteres especiais --&gt;</span>
  <span class="hm">&lt;meta</span> <span class="ha">charset</span>=<span class="hs">"UTF-8"</span><span class="hm">&gt;</span>

  <span class="hc">&lt;!-- viewport: garante responsividade em celulares --&gt;</span>
  <span class="hm">&lt;meta</span> <span class="ha">name</span>=<span class="hs">"viewport"</span> <span class="ha">content</span>=<span class="hs">"width=device-width, initial-scale=1.0"</span><span class="hm">&gt;</span>

  <span class="hc">&lt;!-- title: aparece na aba do browser e nos resultados do Google --&gt;</span>
  <span class="hk">&lt;title&gt;</span><span class="ht">Seu Nome Aqui</span><span class="hk">&lt;/title&gt;</span>
<span class="hk">&lt;/head&gt;</span>

<span class="hk">&lt;body&gt;</span>

  <span class="hc">&lt;!-- todo o conteúdo visível da página vai aqui --&gt;</span>

<span class="hk">&lt;/body&gt;</span>
<span class="hk">&lt;/html&gt;</span>`
},

/* ══ PASSO 3 ════════════════════════════════════════════════ */
{
  title: "Header — cabeçalho da página",
  time: "7 min",
  instrs: [
    "Dentro do <code>&lt;body&gt;</code>, adicione um comentário: <code>&lt;!-- CABEÇALHO --&gt;</code>",
    "Crie a tag <code>&lt;header&gt;</code> com seu nome dentro de um <code>&lt;h1&gt;</code>",
    "Abaixo do <code>&lt;h1&gt;</code>, adicione um <code>&lt;p&gt;</code> com sua área de interesse",
    "Salve e veja o resultado no browser — o h1 aparece grande"
  ],
  tip: "<strong>Lembre:</strong> o h1 é único por página. Representa o título principal — como o título de um livro.",
  gab:
`<span class="hc">&lt;!-- CABEÇALHO --&gt;</span>

<span class="hc">&lt;!-- &lt;header&gt; é uma tag SEMÂNTICA — diz ao browser e leitores de tela
     que este bloco é o cabeçalho da página (não confundir com &lt;head&gt;!) --&gt;</span>
<span class="hk">&lt;header&gt;</span>

  <span class="hc">&lt;!-- h1 = título principal da página — deve ser ÚNICO por documento
       Representa o assunto central, como o título de um livro --&gt;</span>
  <span class="hk">&lt;h1&gt;</span><span class="ht">Seu Nome</span><span class="hk">&lt;/h1&gt;</span>

  <span class="hc">&lt;!-- &lt;p&gt; = parágrafo — bloco de texto genérico --&gt;</span>
  <span class="hk">&lt;p&gt;</span><span class="ht">Estudante de Desenvolvimento de Sistemas — SENAI</span><span class="hk">&lt;/p&gt;</span>

<span class="hk">&lt;/header&gt;</span>`
},

/* ══ PASSO 4 ════════════════════════════════════════════════ */
{
  title: "Nav — barra de navegação",
  time: "8 min",
  instrs: [
    "Após o <code>&lt;/header&gt;</code>, adicione o comentário <code>&lt;!-- NAVEGAÇÃO --&gt;</code>",
    "Crie a tag <code>&lt;nav&gt;</code> com 3 links: Início, Sobre, Contato",
    "Use <code>href='index.html'</code>, <code>href='sobre.html'</code>, <code>href='contato.html'</code>",
    "Salve — os links ficam azuis e clicáveis (as páginas ainda não existem, mas os links sim)"
  ],
  tip: "<strong>Por enquanto</strong> os links aparecem sem estilo diferenciado — isso muda na Aula 02 quando aprendermos CSS.",
  gab:
`<span class="hc">&lt;!-- NAVEGAÇÃO --&gt;</span>

<span class="hc">&lt;!-- &lt;nav&gt; é semântico: indica ao browser que este bloco
     contém links de navegação principal da página --&gt;</span>
<span class="hk">&lt;nav&gt;</span>

  <span class="hc">&lt;!-- &lt;a&gt; = âncora (hyperlink)
       href = "para onde o link aponta"
       Por enquanto usamos nomes de arquivo; em produção
       podem ser URLs completas ou caminhos relativos --&gt;</span>
  <span class="hk">&lt;a</span> <span class="ha">href</span>=<span class="hs">"index.html"</span><span class="hk">&gt;</span><span class="ht">Início</span><span class="hk">&lt;/a&gt;</span>

  <span class="hk">&lt;a</span> <span class="ha">href</span>=<span class="hs">"sobre.html"</span><span class="hk">&gt;</span><span class="ht">Sobre</span><span class="hk">&lt;/a&gt;</span>

  <span class="hk">&lt;a</span> <span class="ha">href</span>=<span class="hs">"contato.html"</span><span class="hk">&gt;</span><span class="ht">Contato</span><span class="hk">&lt;/a&gt;</span>

<span class="hk">&lt;/nav&gt;</span>`
},

/* ══ PASSO 5 ════════════════════════════════════════════════ */
{
  title: "Main + section — conteúdo principal",
  time: "10 min",
  instrs: [
    "Adicione <code>&lt;!-- CONTEÚDO PRINCIPAL --&gt;</code> e a tag <code>&lt;main&gt;</code>",
    "Dentro do <code>&lt;main&gt;</code>, crie uma <code>&lt;section&gt;</code> com <code>&lt;h2&gt;Sobre mim&lt;/h2&gt;</code>",
    "Escreva pelo menos 2 parágrafos reais sobre você (não deixe texto de exemplo!)",
    "Crie uma segunda <code>&lt;section&gt;</code> com <code>&lt;h2&gt;</code> de outro assunto"
  ],
  tip: "<strong>Hierarquia:</strong> só 1 h1 por página. Seções usam h2. Subseções usariam h3. Nunca pule nível por questões visuais — use CSS para isso.",
  gab:
`<span class="hc">&lt;!-- CONTEÚDO PRINCIPAL --&gt;</span>

<span class="hc">&lt;!-- &lt;main&gt; marca o conteúdo ÚNICO e principal da página.
     Deve ser único por documento. Leitores de tela usam
     esta tag para pular o cabeçalho e ir direto ao conteúdo --&gt;</span>
<span class="hk">&lt;main&gt;</span>

  <span class="hc">&lt;!-- &lt;section&gt; agrupa conteúdo tematicamente relacionado.
       Deve sempre ter um título (h2, h3...) identificando o tema --&gt;</span>
  <span class="hk">&lt;section&gt;</span>

    <span class="hc">&lt;!-- h2 = subtítulo de seção — segundo nível da hierarquia --&gt;</span>
    <span class="hk">&lt;h2&gt;</span><span class="ht">Sobre mim</span><span class="hk">&lt;/h2&gt;</span>

    <span class="hc">&lt;!-- Escreva CONTEÚDO REAL — avaliadores e leitores de tela
         identificam texto de placeholder como descuido --&gt;</span>
    <span class="hk">&lt;p&gt;</span><span class="ht">Escreva aqui sobre você — quem é,
    o que gosta, por que escolheu TI...</span><span class="hk">&lt;/p&gt;</span>

    <span class="hk">&lt;p&gt;</span><span class="ht">Segundo parágrafo com mais detalhes.</span><span class="hk">&lt;/p&gt;</span>

  <span class="hk">&lt;/section&gt;</span>

  <span class="hc">&lt;!-- Segunda seção — tema diferente, mesmo nível hierárquico --&gt;</span>
  <span class="hk">&lt;section&gt;</span>
    <span class="hk">&lt;h2&gt;</span><span class="ht">Outro assunto</span><span class="hk">&lt;/h2&gt;</span>
    <span class="hk">&lt;p&gt;</span><span class="ht">Conteúdo desta seção...</span><span class="hk">&lt;/p&gt;</span>
  <span class="hk">&lt;/section&gt;</span>

<span class="hk">&lt;/main&gt;</span>`
},

/* ══ PASSO 6 ════════════════════════════════════════════════ */
{
  title: "Listas — ul, ol e li",
  time: "10 min",
  instrs: [
    "Dentro de uma <code>&lt;section&gt;</code>, crie uma lista <code>&lt;ul&gt;</code> com 5 itens sobre você",
    "Em outra seção, crie uma lista <code>&lt;ol&gt;</code> com 3 passos para acessar um site",
    "Cada item usa a tag <code>&lt;li&gt;</code> dentro do <code>&lt;ul&gt;</code> ou <code>&lt;ol&gt;</code>",
    "Salve e compare: a <code>&lt;ul&gt;</code> mostra bolinhas, a <code>&lt;ol&gt;</code> mostra números"
  ],
  tip: "<strong>Regra prática:</strong> ul = itens sem ordem (lista de compras, características). ol = itens com ordem obrigatória (passos, ranking).",
  gab:
`<span class="hk">&lt;section&gt;</span>

  <span class="hk">&lt;h2&gt;</span><span class="ht">5 coisas sobre mim</span><span class="hk">&lt;/h2&gt;</span>

  <span class="hc">&lt;!-- &lt;ul&gt; = unordered list (lista não-ordenada)
       O browser exibe marcadores (• bolinhas) por padrão.
       Use quando a ORDEM dos itens NÃO importa --&gt;</span>
  <span class="hk">&lt;ul&gt;</span>
    <span class="hc">&lt;!-- &lt;li&gt; = list item — obrigatório dentro de ul e ol --&gt;</span>
    <span class="hk">&lt;li&gt;</span><span class="ht">Gosto de tecnologia</span><span class="hk">&lt;/li&gt;</span>
    <span class="hk">&lt;li&gt;</span><span class="ht">Aprendo HTML no SENAI</span><span class="hk">&lt;/li&gt;</span>
    <span class="hk">&lt;li&gt;</span><span class="ht">Item 3...</span><span class="hk">&lt;/li&gt;</span>
    <span class="hk">&lt;li&gt;</span><span class="ht">Item 4...</span><span class="hk">&lt;/li&gt;</span>
    <span class="hk">&lt;li&gt;</span><span class="ht">Item 5...</span><span class="hk">&lt;/li&gt;</span>
  <span class="hk">&lt;/ul&gt;</span>

<span class="hk">&lt;/section&gt;</span>

<span class="hk">&lt;section&gt;</span>

  <span class="hk">&lt;h2&gt;</span><span class="ht">Como acessar o GitHub</span><span class="hk">&lt;/h2&gt;</span>

  <span class="hc">&lt;!-- &lt;ol&gt; = ordered list (lista ordenada)
       O browser exibe números (1, 2, 3...) por padrão.
       Use quando a ORDEM dos itens IMPORTA (passo a passo, ranking) --&gt;</span>
  <span class="hk">&lt;ol&gt;</span>
    <span class="hk">&lt;li&gt;</span><span class="ht">Abra o browser</span><span class="hk">&lt;/li&gt;</span>
    <span class="hk">&lt;li&gt;</span><span class="ht">Digite github.com</span><span class="hk">&lt;/li&gt;</span>
    <span class="hk">&lt;li&gt;</span><span class="ht">Crie sua conta grátis</span><span class="hk">&lt;/li&gt;</span>
  <span class="hk">&lt;/ol&gt;</span>

<span class="hk">&lt;/section&gt;</span>`
},

/* ══ PASSO 7 ════════════════════════════════════════════════ */
{
  title: "Footer — rodapé e validação final",
  time: "12 min",
  instrs: [
    "Após o <code>&lt;/main&gt;</code>, adicione <code>&lt;!-- RODAPÉ --&gt;</code> e a tag <code>&lt;footer&gt;</code>",
    "Dentro coloque: <code>&lt;p&gt;&amp;copy; 2025 Seu Nome&lt;/p&gt;</code> — o <code>&amp;copy;</code> vira ©",
    "Acesse <a href='https://validator.w3.org/#validate_by_input' target='_blank'>validator.w3.org</a>, cole seu HTML e clique em Check",
    "Corrija todos os erros apontados — o documento deve ficar verde"
  ],
  tip: "<strong>Entidades HTML úteis:</strong> <code>&amp;copy;</code> = © | <code>&amp;amp;</code> = &amp; | <code>&amp;lt;</code> = &lt; | <code>&amp;gt;</code> = &gt; | <code>&amp;eacute;</code> = é",
  gab:
`<span class="hc">&lt;!-- RODAPÉ --&gt;</span>

<span class="hc">&lt;!-- &lt;footer&gt; é semântico: indica informações de rodapé.
     Pode aparecer dentro de &lt;article&gt; ou &lt;section&gt; também,
     mas aqui usamos no nível da página inteira --&gt;</span>
<span class="hk">&lt;footer&gt;</span>

  <span class="hc">&lt;!-- &amp;copy; é uma entidade HTML — representa o símbolo ©
       Entidades começam com & e terminam com ; --&gt;</span>
  <span class="hk">&lt;p&gt;</span><span class="ht">&amp;copy; 2025 Seu Nome — SENAI</span><span class="hk">&lt;/p&gt;</span>

<span class="hk">&lt;/footer&gt;</span>

<span class="hc">&lt;!-- ESTRUTURA COMPLETA DO &lt;body&gt; após todos os passos:

  &lt;body&gt;
    &lt;header&gt;  ... &lt;/header&gt;    ← cabeçalho
    &lt;nav&gt;     ... &lt;/nav&gt;       ← navegação
    &lt;main&gt;
      &lt;section&gt; ... &lt;/section&gt;  ← seção 1
      &lt;section&gt; ... &lt;/section&gt;  ← seção 2
    &lt;/main&gt;
    &lt;footer&gt;  ... &lt;/footer&gt;   ← rodapé
  &lt;/body&gt;

  Essa estrutura semântica é o padrão HTML5 moderno! --&gt;</span>`
}

]; /* fim STEPS */

/* ─────────────────────────────────────────────────────────────
   RENDERIZAÇÃO E LÓGICA
   ───────────────────────────────────────────────────────────── */
let done = new Set();

function buildSteps() {
  const list = document.getElementById('steps-list');

  STEPS.forEach((s, i) => {

    /* instruções numeradas */
    const instrHtml = s.instrs
      .map((t, j) => `<div class="instr-item"><div class="instr-n">${j+1}</div><span>${t}</span></div>`)
      .join('');

    /* sanfona do gabarito */
    const gabHtml = `
      <div class="gabarito-wrap">
        <button class="gab-btn" id="gbtn-${i}" onclick="togGab(${i})">
          <span class="gab-icon">📋</span>
          Gabarito comentado
          <svg class="gab-arr" viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="gab-body" id="gbody-${i}">
          <div class="gab-alert">
            ⚠️&nbsp;<strong>Dica:</strong> tente resolver sozinho antes de consultar — o aprendizado acontece no esforço!
          </div>
          <div class="gab-codebar">
            <span class="gab-lang">HTML — gabarito comentado</span>
            <button class="gab-copy" id="gcopy-${i}" onclick="cpGab(${i})">Copiar</button>
          </div>
          <div class="gab-code" id="gcode-${i}">${s.gab}</div>
        </div>
      </div>`;

    /* card do passo */
    const card = document.createElement('div');
    card.className = 'step-card active' + (i === 0 ? ' open' : '');
    card.id = 'sc-' + i;

    card.innerHTML = `
      <div class="step-head" onclick="toggleStep(${i})">
        <div class="step-check" id="chk-${i}" onclick="event.stopPropagation(); markDone(${i})">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
            <path d="M2 6.5l3.5 3.5 5.5-5.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="step-info">
          <div class="step-num">Passo ${i+1} de ${STEPS.length}</div>
          <div class="step-ttl">${s.title}</div>
          <div class="step-time">${s.time}</div>
        </div>
        <span class="chevron">${i === 0 ? '▲' : '▼'}</span>
      </div>
      <div class="step-body">
        <div class="step-body-inner">
          <div class="instr-list">${instrHtml}</div>
          ${gabHtml}
          ${s.tip ? `<div class="tip">${s.tip}</div>` : ''}
          <button class="mark-btn" id="mb-${i}" onclick="markDone(${i})">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M2 7l4 4 6-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Marcar como concluído
          </button>
        </div>
      </div>`;

    list.appendChild(card);
  });
}

/* abre/fecha passo principal */
function toggleStep(i) {
  const card = document.getElementById('sc-' + i);
  const isOpen = card.classList.contains('open');
  document.querySelectorAll('.step-card').forEach(c => {
    c.classList.remove('open');
    c.querySelector('.chevron').textContent = '▼';
  });
  if (!isOpen) {
    card.classList.add('open');
    card.querySelector('.chevron').textContent = '▲';
  }
}

/* abre/fecha sanfona do gabarito */
function togGab(i) {
  const btn  = document.getElementById('gbtn-'  + i);
  const body = document.getElementById('gbody-' + i);
  const open = body.classList.contains('open');
  body.classList.toggle('open', !open);
  btn.classList.toggle('open',  !open);
}

/* copia o código do gabarito */
function cpGab(i) {
  const code = document.getElementById('gcode-' + i);
  const btn  = document.getElementById('gcopy-' + i);
  navigator.clipboard.writeText(code.innerText);
  btn.textContent = 'Copiado!';
  setTimeout(() => btn.textContent = 'Copiar', 2000);
}

/* marca passo como concluído */
function markDone(i) {
  if (done.has(i)) return;
  done.add(i);

  document.getElementById('chk-' + i).classList.add('done');
  document.getElementById('sc-'  + i).classList.add('done');

  const mb = document.getElementById('mb-' + i);
  mb.classList.add('done-btn');
  mb.innerHTML = `
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M2 7l4 4 6-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Concluído!`;

  updateProg();

  if (i < STEPS.length - 1) {
    document.querySelectorAll('.step-card').forEach(c => {
      c.classList.remove('open');
      c.querySelector('.chevron').textContent = '▼';
    });
    const next = document.getElementById('sc-' + (i + 1));
    next.classList.add('open');
    next.querySelector('.chevron').textContent = '▲';
    setTimeout(() => next.scrollIntoView({ behavior:'smooth', block:'nearest' }), 100);
  }

  if (done.size === STEPS.length) {
    document.getElementById('success').classList.add('show');
    setTimeout(() => document.getElementById('success').scrollIntoView({ behavior:'smooth', block:'nearest' }), 200);
  }
}

function updateProg() {
  const pct = Math.round((done.size / STEPS.length) * 100);
  document.getElementById('pfg').style.width = pct + '%';
  document.getElementById('ptxt').textContent = done.size + ' / ' + STEPS.length;
}

buildSteps();
updateProg();
</script>
</body>
</html>
